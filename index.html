<body>
<div id="app">
  <h1 class="title">シェイクおみくじ</h1>
  <p class="intro">スマホを<b>シェイク！</b><br/>(PCはタップでもOK)</p>
  <div class="box-wrap">
    <div class="box" id="box">
      <div class="icon" id="icon">🎁</div>
      <div class="hint" id="hint">振って占う！</div>
      <div class="result" id="result">
        <div class="rank" id="rank"></div>
        <div class="quote" id="quote"></div>
      </div>
    </div>
  </div>
  <div class="actions">
    <button id="btn-tap">📱 振るかタップ</button>
    <button id="btn-share" class="share" disabled>🔗 シェア</button>
  </div>
  <div class="note">PCはボタン、スマホは端末を振ってください</div>
</div>
<div class="flash" id="flash"></div>
<script>
(()=>{
'use strict';
const SHARE_URL='https://maxtakaharu34-cmd.github.io/shake-omikuji-jp/';
const RANKS=[
{lbl:'大吉',w:8,c:'#ffe066',q:'今日は最高の一日！何やってもうまくいく日です。'},
{lbl:'中吉',w:18,c:'#ff9aa9',q:'良いことが起きる予感。チャレンジしてみよう。'},
{lbl:'小吉',w:25,c:'#a3e635',q:'平和な一日。穏やかに過ごせます。'},
{lbl:'吉',w:25,c:'#88ccff',q:'運気は普通。地に足をつけて。'},
{lbl:'末吉',w:14,c:'#a874e0',q:'徐々に良くなる兆し。気長に待つこと。'},
{lbl:'凶',w:8,c:'#666',q:'危険な雰囲気。早寝が吉。'},
{lbl:'大凶',w:2,c:'#222',q:'激ヤバ。何もせずベッドへ。'}
];
const $=(id)=>document.getElementById(id);
const box=$('box'),icon=$('icon'),hint=$('hint'),result=$('result'),rankEl=$('rank'),quoteEl=$('quote');
const flash=$('flash');
let drawing=false,lastResult=null;
let ac=null;
const en=()=>{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume();return ac};
const beep=(f,d,t='triangle',g=.15)=>{const a=en();const o=a.createOscillator();const gn=a.createGain();o.type=t;o.frequency.value=f;gn.gain.value=g;gn.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);o.connect(gn).connect(a.destination);o.start();o.stop(a.currentTime+d)};
const drumroll=()=>{[110,130,110,130,110,130,110,130,110,130].forEach((f,i)=>setTimeout(()=>beep(f,.04,'sawtooth',.12),i*60))};
const fanfare=()=>{[523,659,784,1047,1318].forEach((f,i)=>setTimeout(()=>beep(f,.16,'triangle',.18),i*90))};
const sad=()=>{[440,330,220,165].forEach((f,i)=>setTimeout(()=>beep(f,.22,'sawtooth',.18),i*120))};

function pickRank(){const total=RANKS.reduce((s,r)=>s+r.w,0);let r=Math.random()*total;for(const x of RANKS){r-=x.w;if(r<0)return x}return RANKS[0]}
function draw(){
  if(drawing)return;
  en();
  drawing=true;
  result.classList.remove('show');
  icon.style.display='';hint.style.display='';
  box.classList.add('shaking');
  drumroll();
  setTimeout(()=>{
    box.classList.remove('shaking');
    const r=pickRank();lastResult=r;
    icon.style.display='none';hint.style.display='none';
    rankEl.textContent=r.lbl;rankEl.style.color=r.c;
    quoteEl.textContent=r.q;
    result.classList.add('show');
    if(['大吉','中吉','小吉'].includes(r.lbl)){fanfare();flash.classList.add('fire');setTimeout(()=>flash.classList.remove('fire'),200)}
    else if(['凶','大凶'].includes(r.lbl))sad();
    else beep(660,.18,'square',.16);
    $('btn-share').disabled=false;
    drawing=false;
  },1100);
}

// Shake detection
let lastShake=0;
window.addEventListener('devicemotion',(e)=>{
  const a=e.accelerationIncludingGravity;
  if(!a)return;
  const m=Math.hypot(a.x||0,a.y||0,a.z||0);
  if(m>22 && Date.now()-lastShake>1500){
    lastShake=Date.now();
    draw();
  }
});
$('btn-tap').addEventListener('click',()=>{
  // iOS 13+ requires permission
  if(typeof DeviceMotionEvent!=='undefined' && typeof DeviceMotionEvent.requestPermission==='function'){
    DeviceMotionEvent.requestPermission().catch(()=>{});
  }
  draw();
});
box.addEventListener('click',draw);
$('btn-share').addEventListener('click',()=>{
  if(!lastResult)return;
  const txt=`シェイクで運勢「${lastResult.lbl}」が出た！${lastResult.q} #シェイクおみくじ`;
  const url=`https://x.com/intent/post?text=${encodeURIComponent(txt)}&url=${encodeURIComponent(SHARE_URL)}`;
  window.open(url,'_blank','noopener,noreferrer');
});
})();
</script>
